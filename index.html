<!DOCTYPE html>
<html>
<head>
    <title>My Website</title>
    <style>
        body { text-align: center; font-family: Arial; }
        img { width: 200px; margin: 10px; cursor: pointer; }
        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
        }
        #lightbox img { width: 400px; margin-top: 100px; }
    </style>
</head>
<body>

<h1>My One Page Website</h1>
<p>Click an image</p>

<img src="https://via.placeholder.com/200" onclick="openLightbox(this.src)">
<img src="https://via.placeholder.com/200/ff0000" onclick="openLightbox(this.src)">
<img src="https://via.placeholder.com/200/0000ff" onclick="openLightbox(this.src)">

<div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img">
</div>

<script>
function openLightbox(src) {
    document.getElementById("lightbox").style.display = "block";
    document.getElementById("lightbox-img").src = src;
}
function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
